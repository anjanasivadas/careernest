{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="{% static 'login/css/style.css' %}">
</head>
<body>

<div class="login-wrap">
  <div class="login-html">

    <h2 style="color:white;text-align:center;">Create Account</h2>
    {% if messages %}
      {% for message in messages %}
        <p style="color:red;text-align:center;">{{ message }}</p>
      {% endfor %}
    {% endif %}
    <form method="POST" action="{% url 'careerapp:save_registration' %}">
      {% csrf_token %}

      <div class="group">
        <label class="label">Username</label>
        <input type="text" name="username" class="input" required>
      </div>

      <div class="group">
        <label class="label">Email</label>
        <input type="email" name="email" class="input" required>
      </div>

      <div class="group">
        <label class="label">Password</label>
        <input type="password" name="password1" class="input" required>
      </div>

      <div class="group">
        <label class="label">Confirm Password</label>
        <input type="password" name="password2" class="input" required>
      </div>
        <div class="group">
          <label class="label">Register As</label>
          <select name="user_type" class="input" required>
            <option value="">Select User Type</option>
            <option value="candidate">Candidate</option>
            <option value="employer">Employer</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      <div class="group">
        <input type="submit" class="button" value="Register">
      </div>

      <div class="hr"></div>

      <div class="foot-lnk">
        Already have an account?
        <a href="{% url 'careerapp:sign_in' %}" style="color:#fff;">Sign In</a>
      </div>

    </form>

  </div>
</div>

</body>
</html>
